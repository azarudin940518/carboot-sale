<!DOCTYPE html>
<html lang="ms">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>POS Carboot PRO - V34.0</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .sold-out { position: relative; opacity: 0.4; pointer-events: none !important; filter: grayscale(1); }
        .sold-out::after {
            content: "HABIS"; position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%) rotate(-15deg);
            color: #ff0000; font-weight: 900; font-size: 2rem; border: 6px solid #ff0000; padding: 5px 20px; z-index: 100;
            background: rgba(0,0,0,0.9); white-space: nowrap;
        }
    </style>
</head>
<body class="bg-slate-900 text-slate-100 p-4 pb-80 font-sans">

    <div class="max-w-md mx-auto">
        <header class="flex justify-between items-center mb-6 border-b border-slate-700 pb-3">
            <div>
                <h1 class="text-2xl font-black text-yellow-400 italic">CARBOOT POS</h1>
                <p class="text-[9px] text-green-400 font-bold uppercase tracking-widest">v34.0 • Real-Time Sync</p>
            </div>
            <button onclick="location.reload()" class="bg-slate-800 text-[10px] px-3 py-1 rounded-lg border border-slate-600 font-bold text-white uppercase">Refresh</button>
        </header>

        <input type="text" id="searchInput" onkeyup="renderItems()" placeholder="Cari Kod (Cth: L1)..." 
        class="w-full bg-slate-800 border-2 border-blue-900 rounded-2xl px-5 py-4 text-lg font-black outline-none focus:border-blue-500 text-white">

        <div id="item-container" class="space-y-3 mt-4"></div>
    </div>

    <div class="fixed bottom-0 left-0 right-0 bg-slate-800 p-5 border-t-4 border-yellow-500 z-[200] max-w-md mx-auto rounded-t-[2.5rem] shadow-2xl">
        <div class="grid grid-cols-3 gap-2 mb-4 text-center font-mono">
            <div class="bg-slate-900 p-2 rounded-xl border border-slate-700">
                <span class="text-[8px] block text-slate-500 font-black">SUBTOTAL</span>
                <span id="subTotalDisplay" class="text-sm font-bold">RM 0.00</span>
            </div>
            <div class="bg-slate-900 p-2 rounded-xl border border-red-900/50">
                <span class="text-[8px] block text-red-500 font-black">DISKAUN</span>
                <span id="discountDisplay" class="text-sm font-bold text-red-400">-RM 0.00</span>
            </div>
            <div class="bg-slate-900 p-2 rounded-xl border border-green-900/50">
                <span class="text-[8px] block text-green-500 font-black">TOTAL</span>
                <span id="grandTotal" class="text-lg font-black text-yellow-400">RM 0.00</span>
            </div>
        </div>
        
        <div class="grid grid-cols-2 gap-2 mb-4">
            <input type="number" id="discountInput" oninput="calculate()" placeholder="Potong RM" class="bg-red-900/20 text-red-100 rounded-xl p-3 text-center font-black border border-red-800 outline-none">
            <input type="number" id="cashInput" oninput="calculate()" placeholder="Tunai RM" class="bg-white text-slate-900 rounded-xl p-3 text-center font-black outline-none">
        </div>

        <button id="btnCheckout" onclick="submitSale()" class="w-full bg-yellow-500 text-slate-900 font-black py-4 rounded-2xl shadow-xl text-xl uppercase active:scale-95 border-b-4 border-yellow-700">
            SIMPAN JUALAN <span id="changeAmt" class="block text-[10px] font-normal lowercase italic">Baki: RM 0.00</span>
        </button>
    </div>
